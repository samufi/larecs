name: Build and test

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -ieo pipefail {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pixi CLI
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh

      - name: Install mojo and dependencies
        run: |
          pixi install --locked

      - name: Check formatting
        run: |
          if pixi run mojo format src test benchmark 2>&1 | grep -E "reformatted|error|failed" ; then echo "Formatter failed" ; exit 1 ; else echo "Formatting OK"; fi

      - name: Run tests
        run: |
          pixi run tests test

      - name: Run benchmarks
        run: pixi run benchmarks

      - name: Run examples
        run: |
          cd examples/satellites
          pixi run satellites
