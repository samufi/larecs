name: Release

on:
  release:
    types: [created]
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  id-token: write

jobs:
  define-matrix:
    name: Define matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          echo 'matrix=[{ "os": "ubuntu-latest", "target-platform": "linux-64" }, { "os": "macos-latest", "target-platform": "osx-arm64" }]' >> $GITHUB_OUTPUT
  define-version:
    name: Define version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - id: set-version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.5.0b4" >> "$GITHUB_OUTPUT"
          fi
  build:
    name: Build package
    needs:
      - define-matrix
      - define-version
    runs-on: ${{ matrix.os }}
    env:
      LARECS_VERSION: ${{ needs.define-version.outputs.version }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.39
        with:
          # needs to be unique for each matrix entry
          artifact-name: package-${{ matrix.target-platform }}
          build-args: >
            --target-platform ${{ matrix.target-platform }}
            --channel conda-forge
            --channel https://repo.prefix.dev/max-nightly
            --channel https://repo.prefix.dev/modular-community
            --channel https://prefix.dev/tree-d
            ${{ case(github.event_name == 'release', '', '--no-test') }}
  build-gate:
    name: Build gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "All builds completed successfully."
  upload:
    if: ${{ github.event_name == 'release' }}
    name: Upload conda packages to Tree-D Prefix channel
    runs-on: ubuntu-latest
    needs:
      - build-gate
      - define-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.target-platform }}
          path: dist/${{ matrix.target-platform }}
      - uses: prefix-dev/rattler-build-action@v0.2.39
        with:
          setup-only: true
      - name: Upload package to prefix.dev
        shell: bash
        run: |
          for pkg in $(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) ); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix --channel tree-d "${pkg}"
          done
