name: Release

on:
  release:
    types: [created]
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  define-matrix:
    name: Define matrix
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.set-matrix.outputs.os }}
      target-platform: ${{ steps.set-matrix.outputs.target-platform }}
    steps:
      - id: set-matrix
        run: |
          echo 'os=["ubuntu-latest","macos-latest"]' >> $GITHUB_OUTPUT
          echo 'target-platform=["linux-64","osx-arm64"]' >> $GITHUB_OUTPUT
  build:
    name: Build package
    needs: define-matrix
    runs-on: ${{ matrix.os }}
    env:
      LARECS_VERSION: |-
        ${{
          case(
            github.event_name == 'release', github.event.release.tag_name,
            '0.5.0b1'
          )
        }}
    strategy:
      matrix:
        os: ${{ fromJSON(needs.define-matrix.outputs.os) }}
        target-platform: ${{ fromJSON(needs.define-matrix.outputs.target-platform) }}

    steps:
      - uses: actions/checkout@v6
      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.39
        with:
          # needs to be unique for each matrix entry
          artifact-name: package-${{ matrix.target-platform }}
          build-args: --target-platform ${{ matrix.target-platform }}${{ matrix.target-platform == 'linux-aarch64' && ' --no-test' || '' }} --channel conda-forge --channel https://repo.prefix.dev/max-nightly --channel https://repo.prefix.dev/modular-community --channel https://prefix.dev/tree-d
  build-gate:
    name: Build gate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "All builds completed successfully."
  upload:
    if: ${{ github.event_name == 'release' }}
    name: Upload conda packages to Tree-D Prefix channel
    runs-on: ubuntu-latest
    needs:
      - build-gate
      - define-matrix
    strategy:
      matrix:
        os: ${{ fromJSON(needs.define-matrix.outputs.os) }}
        target-platform: ${{ fromJSON(needs.define-matrix.outputs.target-platform) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.target-platform }}
          path: dist/${{ matrix.target-platform }}
      - uses: prefix-dev/rattler-build-action@v0.2.39
        with:
          setup-only: true
      - run: |
          for pkg in $(find dist -type f \( -name "*.conda" -o -name "*.tar.bz2" \) ); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c tree-d "${pkg}"
          done
