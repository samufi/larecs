context:
  version: "0.5.0"

package:
  name: "larecs"
  version: ${{ version }}

source:
  path: ../
  filter:
    - src/
    - scripts/
    - test/
    - pixi.toml
    - pixi.lock
    - LICENSE
    - changelog.md
    - README.md

build:
  number: 0
  script:
    - mojo package src/larecs -o ${{ PREFIX }}/lib/mojo/larecs.mojopkg

requirements:
  build:
    - mojo-compiler >1.0.0b1, <=1.0.0b2
  host:
    - mojo-compiler >1.0.0b1, <=1.0.0b2
  run:
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - script:
      - if: unix
        then:
          - test/run_tests.sh test
    requirements:
      run:
        - clang >=22.1.7, <23
        - mogo-tester >= 2.3.2
        - ${{ pin_compatible('mojo-compiler') }}
    files:
      source:
        - scripts/
        - test/
        - pixi.toml

about:
  homepage: https://samufi.github.io/larecs/
  license: LGPL-3.0-only
  license_file: LICENSE
  summary: A performance-oriented archetype-based ECS for Mojo🔥.
  repository: https://github.com/samufi/larecs

extra:
  maintainers:
    - samufi
    - mlange-42
    - moseschmiedel
  project_name: Larecs🌲
